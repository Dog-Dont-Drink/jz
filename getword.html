<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR 流程测试</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
        margin: 0;
        background: #f7f7f9;
        color: #222;
      }
      .wrap {
        max-width: 900px;
        margin: 40px auto;
        background: #fff;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .row {
        margin: 16px 0;
      }
      input[type="text"],
      input[type="file"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      button {
        border: none;
        background: #111827;
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      pre {
        background: #f3f4f6;
        padding: 14px;
        border-radius: 10px;
        white-space: pre-wrap;
        word-break: break-all;
        min-height: 60px;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
      .muted {
        color: #666;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>OCR 流程测试页（白描）</h1>
      <div class="row">
        <label>API 基础地址</label>
        <input id="baseUrl" type="text" value="/baimiao" />
        <div class="muted">
          该页面默认走 Vite 代理 <code>/baimiao</code>（见 <code>vite.config.ts</code>），用于绕过浏览器 CORS。
        </div>
      </div>

      <div class="row">
        <label>选择文件</label>
        <input id="fileInput" type="file" accept="image/*" />
      </div>

      <div class="row">
        <button id="runBtn" disabled>开始 OCR</button>
      </div>

      <div class="row">
        <strong>流程日志</strong>
        <pre id="logBox"></pre>
      </div>

      <div class="row">
        <strong>识别文本</strong>
        <pre id="textBox"></pre>
      </div>
    </div>

    <script type="module">
      import { createXXHash128 } from "https://cdn.jsdelivr.net/npm/hash-wasm@4.12.0/+esm";

      const fileInput = document.getElementById("fileInput");
      const runBtn = document.getElementById("runBtn");
      const baseUrlInput = document.getElementById("baseUrl");
      const logBox = document.getElementById("logBox");
      const textBox = document.getElementById("textBox");

      let currentFile = null;
      const hasher = await createXXHash128();

      function log(msg) {
        logBox.textContent += msg + "\n";
        console.log(msg);
      }

      function readFileAsUint8Array(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(new Uint8Array(e.target.result));
          reader.onerror = () => reject(new Error("读取文件失败"));
          reader.onabort = () => reject(new Error("读取文件被中断"));
          reader.readAsArrayBuffer(file);
        });
      }

      async function calcHash(file) {
        const bytes = await readFileAsUint8Array(file);
        hasher.init(0, 0);
        hasher.update(bytes);
        return hasher.digest("hex");
      }

      function getOrCreateUuid() {
        const key = "baimiao_uuid";
        try {
          const existing = localStorage.getItem(key);
          if (existing && existing.trim()) return existing.trim();
          const uuid = (crypto.randomUUID && crypto.randomUUID()) || `${Date.now()}_${Math.random().toString(16).slice(2)}`;
          localStorage.setItem(key, uuid);
          return uuid;
        } catch {
          return (crypto.randomUUID && crypto.randomUUID()) || `${Date.now()}_${Math.random().toString(16).slice(2)}`;
        }
      }

      async function getAnonToken(baseUrl, uuid) {
        const resp = await fetch(`${baseUrl}/api/user/login/anonymous`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-AUTH-UUID": uuid,
            "X-AUTH-TOKEN": "",
          },
          body: JSON.stringify({}),
        });
        if (!resp.ok) throw new Error(`anonymous login 失败: ${resp.status}`);
        const data = await resp.json();
        if (data?.code === 4) throw new Error("白描接口被风控拦截（code=4），请稍后再试/更换网络");
        const token = data?.data?.token ?? data?.token;
        if (!token) throw new Error(`anonymous login 响应异常: ${JSON.stringify(data)}`);
        return token;
      }

      async function getOcrPermToken(baseUrl, uuid, authToken) {
        const resp = await fetch(`${baseUrl}/api/perm/single`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-AUTH-UUID": uuid,
            "X-AUTH-TOKEN": authToken,
          },
          body: JSON.stringify({ mode: "single", version: "v2" }),
        });
        if (!resp.ok) throw new Error(`perm/single 失败: ${resp.status}`);
        const data = await resp.json();
        if (data?.code === 4) throw new Error("白描接口被风控拦截（code=4），请稍后再试/更换网络");
        const token = data?.data?.token ?? data?.token;
        const engine = data?.data?.engine;
        if (!token) throw new Error(`perm/single 响应异常: ${JSON.stringify(data)}`);
        return { token, engine };
      }

      async function getOssSign(baseUrl, mimeType, uuid, authToken) {
        const resp = await fetch(`${baseUrl}/api/oss/sign?mime_type=${encodeURIComponent(mimeType)}`, {
          method: "GET",
          headers: {
            "X-AUTH-UUID": uuid,
            "X-AUTH-TOKEN": authToken,
          },
        });
        if (!resp.ok) throw new Error(`oss sign 接口失败: ${resp.status}`);
        const data = await resp.json();
        return data?.data ?? data;
      }

      async function uploadToOss(signInfo, file) {
        if (signInfo?.result?.host && signInfo?.result?.file_key && signInfo?.result?.policy) {
          const r = signInfo.result;
          const form = new FormData();
          form.append("key", r.file_key);
          form.append("policy", r.policy);
          form.append("x-oss-signature-version", r.x_oss_signature_version);
          form.append("x-oss-credential", r.x_oss_credential);
          form.append("x-oss-date", r.x_oss_date);
          form.append("x-oss-signature", r.signature);
          if (r.security_token) form.append("x-oss-security-token", r.security_token);
          form.append("success_action_status", "200");
          if (file.type) form.append("Content-Type", file.type);
          form.append("file", file);

          const resp = await fetch(r.host, { method: "POST", body: form });
          if (!resp.ok) throw new Error(`OSS 表单上传失败: ${resp.status}`);
          return r.file_key;
        }

        throw new Error("无法识别 oss sign 返回格式");
      }

      async function submitOcr(baseUrl, payload, uuid, authToken) {
        const resp = await fetch(`${baseUrl}/api/ocr/image/plus`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-AUTH-UUID": uuid,
            "X-AUTH-TOKEN": authToken,
          },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) throw new Error(`提交 OCR 失败: ${resp.status}`);
        const data = await resp.json();
        return data?.data?.jobStatusId ?? data?.jobStatusId;
      }

      async function getStatus(baseUrl, jobStatusId, uuid, authToken) {
        const resp = await fetch(`${baseUrl}/api/ocr/image/plus/status?jobStatusId=${encodeURIComponent(jobStatusId)}`, {
          headers: {
            "X-AUTH-UUID": uuid,
            "X-AUTH-TOKEN": authToken,
          },
        });
        if (!resp.ok) throw new Error(`查询状态失败: ${resp.status}`);
        return resp.json();
      }

      async function pollResult(baseUrl, jobStatusId, uuid, authToken, timeoutMs = 120000, intervalMs = 2000) {
        const start = Date.now();
        while (true) {
          const data = await getStatus(baseUrl, jobStatusId, uuid, authToken);
          const ended = data?.data?.isEnded ?? data?.isEnded ?? false;
          if (ended) return data;
          if (Date.now() - start > timeoutMs) throw new Error("轮询超时");
          await new Promise((r) => setTimeout(r, intervalMs));
        }
      }

      function sanitizeOcrText(input) {
        let s = String(input ?? "");
        s = s.replace(/[\u0000-\u001f\u007f]/g, "");
        s = s.replace(/\u00a0/g, " ").replace(/\u3000/g, " ");
        s = s.replace(/[ \t]{2,}/g, " ");
        s = s.replace(/[★☆■□◆◇●○▲△▼▽※→←↑↓▶▷◁◀◆■□●○◎◇◆]/g, "");
        s = s.replace(
          /[^\p{Script=Han}\p{L}\p{N}\s，。！？；：、,.!?;:（）()《》〈〉【】\[\]“”‘’'"\-—…·\/]/gu,
          ""
        );
        s = s.replace(/([\p{Script=Han}])\s+([\p{Script=Han}])/gu, "$1$2");
        s = s.replace(/\s+([，。！？；：、,.!?;:])/g, "$1");
        return s.trim();
      }

      function extractText(resp) {
        const words = resp?.data?.ydResp?.words_result || resp?.data?.result?.words_result || resp?.result?.words_result || [];
        const lines = Array.isArray(words) ? words.map((x) => String(x?.words || "")).filter(Boolean) : [];
        return lines.map((line) => sanitizeOcrText(line)).filter(Boolean).join("\n").trim();
      }

      fileInput.addEventListener("change", (e) => {
        currentFile = e.target.files[0] || null;
        runBtn.disabled = !currentFile;
      });

      runBtn.addEventListener("click", async () => {
        if (!currentFile) return;

        const baseUrl = baseUrlInput.value.trim().replace(/\/$/, "");
        const uuid = getOrCreateUuid();
        logBox.textContent = "";
        textBox.textContent = "";
        runBtn.disabled = true;

        try {
          log("1. 计算 hash");
          const hash = await calcHash(currentFile);
          log("hash = " + hash);

          log("2. 匿名登录拿 authToken");
          const authToken = await getAnonToken(baseUrl, uuid);
          log("authToken 已获取");

          log("2.1 获取 OCR token");
          const perm = await getOcrPermToken(baseUrl, uuid, authToken);
          const ocrToken = perm.token;
          log("ocrToken 已获取 (engine=" + (perm.engine || "") + ")");

          log("3. 获取上传签名");
          const signInfo = await getOssSign(baseUrl, currentFile.type || "image/jpeg", uuid, authToken);
          log("oss sign 已获取");

          log("4. 上传文件到 OSS");
          const fileKey = await uploadToOss(signInfo, currentFile);
          log("fileKey = " + fileKey);

          log("5. 提交 OCR 任务");
          const jobStatusId = await submitOcr(
            baseUrl,
            {
              batchId: "",
              total: 1,
              token: ocrToken,
              hash,
              fileKey,
            },
            uuid,
            authToken
          );
          log("jobStatusId = " + jobStatusId);

          log("6. 轮询任务结果");
          const result = await pollResult(baseUrl, jobStatusId, uuid, authToken);
          log("任务结束");

          log("7. 提取文本");
          const text = extractText(result);
          textBox.textContent = text || "没有提取到文本";
        } catch (err) {
          log("错误: " + err.message);
        } finally {
          runBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
